name: Build & Deploy Game Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'new-game-project/**'
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  export:
    name: Export Game Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new-game-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot 4.7 Headless
        run: |
          wget -q -O godot-headless.zip "https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip"
          unzip -q godot-headless.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          mv Godot_v4.7-stable_linux.x86_64 godot
          echo "GODOT_BIN=$(pwd)/godot" >> $GITHUB_ENV

      - name: Diagnose Godot version and export platforms
        run: |
          echo "=== GODOT VERSION ==="
          $GODOT_BIN --version
          echo ""
          echo "=== HELP TEXT (export section) ==="
          $GODOT_BIN --headless --help 2>&1 | grep -A10 "Export" | head -30 || true
          echo ""

      - name: Install Export Templates
        run: |
          wget -q -O templates.tpz "https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          unzip -q templates.tpz -d ~/.local/share/godot/export_templates/4.7.stable
          mv ~/.local/share/godot/export_templates/4.7.stable/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          rm -rf ~/.local/share/godot/export_templates/4.7.stable/templates
          ls ~/.local/share/godot/export_templates/4.7.stable/ | head -20

      - name: Test Windows export with blank project
        run: |
          mkdir -p /tmp/test-windows
          printf '%s\n' '; Engine configuration file.' 'config_version=5' '[application]' 'config/name="TestWindows"' 'run/main_scene=""' 'config/features=PackedStringArray("4.7")' > /tmp/test-windows/project.godot
          printf '%s\n' '[runnable_presets]' '' 'Windows="Windows Desktop"' '' '[preset.0]' '' 'name="Windows Desktop"' 'platform="Windows Desktop"' 'runnable=true' 'export_path="../test-windows-build.zip"' '' '[preset.0.options]' '' 'custom_template/debug=""' 'custom_template/release=""' 'debug/export_console_wrapper=2' 'binary_format/embed_pck=true' 'binary_format/architecture="x86_64"' > /tmp/test-windows/export_presets.cfg
          echo "=== TEST PROJECT ==="
          cat /tmp/test-windows/project.godot
          cat /tmp/test-windows/export_presets.cfg
          echo "=== EXPORT TEST ==="
          $GODOT_BIN --headless --path /tmp/test-windows --export-release "Windows Desktop" /tmp/test-windows-build.zip 2>&1 || echo "EXPORT FAILED"

      - name: Export Linux Dedicated Server
        run: |
          mkdir -p ../release-versions
          $GODOT_BIN --headless --export-release "Linux" ../release-versions/LinuxDedicatedServer.zip

      - name: Export Windows
        run: |
          $GODOT_BIN --headless --export-release "Windows Desktop" ../release-versions/WindowsDedicatedServer.zip

      - name: Export macOS
        run: |
          $GODOT_BIN --headless --export-release "macOS" ../release-versions/MacDedicatedServer.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-servers
          path: release-versions/
          retention-days: 7

  deploy:
    name: Deploy Linux Server to Homelab
    needs: export
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux server build
        uses: actions/download-artifact@v4
        with:
          name: game-servers
          path: ./server

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOMELAB_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Homelab
        run: |
          ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "
            cd ~/godot_server &&
            pkill -f LinuxDedicated 2>/dev/null || true
          "
          scp ./server/LinuxDedicatedServer.zip ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:~/godot_server/new.zip
          ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "
            cd ~/godot_server &&
            unzip -o new.zip &&
            chmod +x LinuxDedicatedServer LinuxDedicatedServer.sh &&
            nohup ./LinuxDedicatedServer.sh > server.log 2>&1 &
            sleep 2
          "

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: game-servers
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Auto-built from commit ${{ github.sha }}
          files: |
            ./release/LinuxDedicatedServer.zip
            ./release/WindowsDedicatedServer.zip
            ./release/MacDedicatedServer.zip
