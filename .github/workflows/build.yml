name: Build & Deploy Game Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'new-game-project/**'
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  export:
    name: Export Game Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new-game-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot 4.7 Headless
        run: |
          wget -q -O godot-headless.zip "https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip"
          unzip -q godot-headless.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          mv Godot_v4.7-stable_linux.x86_64 godot
          echo "GODOT_BIN=$(pwd)/godot" >> $GITHUB_ENV

      - name: Install Export Templates
        run: |
          wget -q -O templates.tpz "https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          unzip -q templates.tpz -d ~/.local/share/godot/export_templates/4.7.stable
          mv ~/.local/share/godot/export_templates/4.7.stable/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          rm -rf ~/.local/share/godot/export_templates/4.7.stable/templates

      - name: Export Linux Dedicated Server
        run: |
          mkdir -p ../release-versions
          $GODOT_BIN --headless --export-release "Linux" ../release-versions/LinuxDedicatedServer.zip

      - name: Export Windows
        run: |
          $GODOT_BIN --headless --export-release "Windows Desktop" ../release-versions/WindowsClient.zip

      - name: Export macOS
        run: |
          $GODOT_BIN --headless --export-release "macOS" ../release-versions/MacClient.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-servers
          path: release-versions/
          retention-days: 7

  deploy:
    name: Deploy Linux Server to Homelab
    needs: export
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux server build
        uses: actions/download-artifact@v4
        with:
          name: game-servers
          path: ./server

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMELAB_SSH_KEY }}

      - name: Deploy to Homelab
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=15" ./server/LinuxDedicatedServer.zip ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:~/godot_server/new.zip
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=15 ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "
            cd ~/godot_server &&
            pkill -f LinuxDedicated 2>/dev/null || true &&
            unzip -o new.zip &&
            chmod +x LinuxDedicatedServer LinuxDedicatedServer.sh &&
            setsid ./LinuxDedicatedServer.sh > server.log 2>&1 &
            sleep 3
          "

      - name: Verify server and notify Discord
        run: |
          VERSION="${{ github.ref_name }}"
          if [ "$VERSION" = "main" ]; then VERSION="latest (${{ github.sha }})"; fi
          sleep 3
          nc -zvu -w5 ${{ secrets.HOMELAB_HOST }} 8067 || true
          curl -s -X POST "https://discord.com/api/v10/channels/${{ secrets.DISCORD_CHANNEL_ID }}/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"🚀 **Server is up on version $VERSION!** <@1032528161889603594> <@1222422715974156298>\"}"
          echo "Discord notification sent"

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: game-servers
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          github_token: ${{ secrets.GH_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ${{ github.actor }} triggered this release from commit ${{ github.sha }}
          generate_release_notes: true
          files: |
            ./release/LinuxDedicatedServer.zip
            ./release/WindowsClient.zip
            ./release/MacClient.zip
